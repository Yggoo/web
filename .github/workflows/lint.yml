name: Lint

on:
  push:
  pull_request:

jobs:
  oxlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20.19.0
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run fmt:check

name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "New Features"
    labels:
      - feature
      - enhancement
  - title: "Bug Fixes"
    labels:
      - bug
      - fix
  - title: "Dependencies"
    labels:
      - dependencies
  - title: "Maintenance"
    labels:
      - chore
      - refactor
      - docs

change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - breaking-change
  minor:
    labels:
      - feature
      - enhancement
  patch:
    labels:
      - bug
      - fix
      - dependencies
      - chore
      - refactor
      - docs
  default: patch

template: |
  ## Changes

  $CHANGES
